      const [globalExp, setGlobalExp] = useState(0);
      const [logs, setLogs] = useState([

        "💡 캐릭터의 [공격] 및 [스킬] 버튼은 직업 고유의 다형성 메커니즘을 동적으로 호출합니다!"

      const [bossShake, setBossShake] = useState(false);

      const [victory, setVictory] = useState(false);
      const [gameOver, setGameOver] = useState(false);

        return Math.floor(BOSS_DATA[bossIndex].maxHp * (1 + (loop - 1) * 0.50));
      };
      
      const getBossDamage = (bossIndex, loop) => {
        return Math.floor(BOSS_DATA[bossIndex].baseDamage * (1 + (loop - 1) * 0.30));
      };

      useEffect(() => {
        setBossHp(getBossMaxHp(0, loopCount));

        title: "CharacterADT (인터페이스 추상 클래스)",
        desc: "모든 캐릭터의 설계도가 되는 Abstract Base Class(ADT)입니다. 파이썬의 abc 모듈을 활용하여 자식 클래스가 반드시 구현해야 할 인터페이스(@abstractmethod)인 name, hp, attack(), move()를 강제 규정합니다.",

class CharacterADT(ABC):
    @property
    @abstractmethod
    def name(self): pass

    @property
    @abstractmethod
    def hp(self): pass

    @abstractmethod
    def attack(self): pass

    @abstractmethod
    def move(self): pass`

    def __init__(self, name, hp):

    @property
    def name(self):
        return self._name

    @property
    def hp(self):
        return self.__hp

    def cast_skill(self):
        print(f"[{self.name}]이(가) 기본 클래스 스킬을 준비합니다.")`

            desc: "그림자 은신 상태에 돌입해 보스 반격을 완전 무마하며, 은신이 걸려있을 때의 첫 일반 공격 데미지를 3배로 대폭 상향시킵니다.",
            code: `class Assassin(GameCharacter):
    def attack(self):
        # 다형성 공격 연산: 은신 상태에서 습격 시 3배 데미지 배율 적용!
        multiplier = 3.0 if self.stealth_active else 1.0

          };
        }

      };

      // 1. 공격 다형성 시동 (즉각 반응)
      const handleAttack = (charId) => {
        if (victory || gameOver || bossHp <= 0) return;

        const actor = party.find(c => c.id === charId);

          // 피드백 반영: 전사, 마법사, 암살자(은신 미작동)는 일반 공격 시 절대로 크리티컬이 발동하지 않도록 차단
          // 즉, 오직 궁수(Archer) 클래스만 기본 공격 시 80% 확률로 크리티컬이 적용됩니다.

        // 핑크빈 무적 배리어 정밀 감지 (매 3턴 무조건 반복 가동)
        const isPinkbeanShieldActive = activeBoss.id === "pinkbean" && (turnCounter % 3 === 0);
        if (isPinkbeanShieldActive) {
          // 궁수(Archer)의 기본 공격은 핑크빈 무적을 관통할 수 없음. 오직 은신 급습 암살자만 관통
          if (!(actor.classType === "Assassin" && actor.stealthCharged)) {
            addLog(`🛡️ 핑크빈의 시간 배리어! [${actor.name}]의 일반 공격이 반사되었습니다. (피해 0)`);

        let dmgText = `${finalDmg} 데미지`;

        }

        const nextBossHp = Math.max(0, bossHp - finalDmg);
        setBossHp(nextBossHp);

        if (finalDmg > 0) {
          setBossShake(true);
          setTimeout(() => setBossShake(false), 300);
        }

        let actionMsg = "";
        if (actor.classType === "Warrior") {
          actionMsg = `[전사 ${actor.name}]이(가) 무기 『${actor.weapon}』로 대지 가르기를 시전하여 ${dmgText}를 입혔습니다!`;
        } else if (actor.classType === "Mage") {
          actionMsg = `[마법사 ${actor.name}]이(가) 주문 『${actor.spell}』을 외워 마나 운석으로 ${dmgText}를 입혔습니다!`;
        } else if (actor.classType === "Archer") {
          actionMsg = `[궁수 ${actor.name}]이(가) 『${actor.bow}』으로 약점을 꿰뚫어 ${dmgText}를 입혔습니다!`;
        } else if (actor.classType === "Assassin") {
          actionMsg = `[암살자 ${actor.name}]이(가) ${actor.daggers}자루 of 단검 투척으로 ${dmgText}를 입혔습니다!`;
        }
        addLog(actionMsg);

        // 은신 회피 및 3배 대미지 버프(stealthCharged) 소모
        setParty(prev => prev.map(c => {
          if (c.id === charId) {

          }

        }));

        if (nextBossHp <= 0) {

      };

      // 2. 스킬 다형성 시동 (즉각 반응 및 직업 특수 스탯 전개)
      const handleSkill = (charId) => {
        if (victory || gameOver || bossHp <= 0) return;

        const actor = party.find(c => c.id === charId);
        if (actor.hp <= 0) {
          addLog(`❌ [${actor.name}]은(는) 기절하여 스킬을 시전할 수 없습니다.`);
          return;
        }

        let skillMsg = "";
        let finalDmg = 0;
        let isCrit = false;

        // 직업별 오버라이딩된 스킬 메커니즘 연산
        if (actor.classType === "Warrior") {
          // 보스의 현재 체력(bossHp)의 15%만큼 비례 피해 연산 적용 (최소 1 데미지 보장)
          finalDmg = Math.max(1, Math.floor(bossHp * 0.15));
          skillMsg = `💥 [전사 고유스킬 - ${actor.skillName}] 도도가 거대한 방패로 보스를 내리쳐 보스 현재 체력의 15%에 달하는 비율 고정 피해 [${finalDmg} 데미지]를 즉시 가했습니다!`;
        } else if (actor.classType === "Mage") {
          // 아군 전체 보호막 생성
          skillMsg = `🔮 [마법사 고유스킬 - ${actor.skillName}] 델리키가 강력한 비전 실드를 가동시켰습니다. 아군 전체에게 가해지는 다음 타격을 각각 30만큼 경감시킵니다!`;
        } else if (actor.classType === "Archer") {

            skillMsg = `🏹 [궁수 고유스킬 - ${actor.skillName}] 바우가 강력한 일점 저격 사격을 가했습니다! 🔥 치명타 폭발! [${finalDmg} 데미지]`;
          } else {
            finalDmg = actor.baseDmg;
            skillMsg = `🏹 [궁수 고유스킬 - ${actor.skillName}] 바우의 조준 일점 격발이 빗나갔습니다. 일반 피해 [${finalDmg} 데미지]`;
          }
        } else if (actor.classType === "Assassin") {
          // 은신 상태 부여 및 급습 3배 버프 가동!
          skillMsg = `👤 [암살자 고유스킬 - ${actor.skillName}] 아루루가 안개 속으로 모습을 감췄습니다. 보스의 다음 공격을 무조건 회피하며, 다음 '공격' 시 위력이 무려 3배로 증가합니다!`;
        }

        // 핑크빈 무적 배리어 정밀 감지 (스킬 사용 시에는 궁수의 관통 허용)
        const isPinkbeanShieldActive = activeBoss.id === "pinkbean" && (turnCounter % 3 === 0);
        if (isPinkbeanShieldActive && finalDmg > 0) {
          // 궁수의 스킬 공격 또는 암살자의 급습 상태만 배리어를 무시할 수 있음
          if (actor.classType !== "Archer" && !(actor.classType === "Assassin" && actor.stealthCharged)) {
            addLog(`🛡️ 핑크빈의 시간 배리어! [${actor.name}]의 스킬 공격이 반사되었습니다. (피해 0)`);
            finalDmg = 0;
          } else {
            addLog(`🎯 [공략!] [${actor.name}]의 정밀 원거리/은신 관통 스킬이 핑크빈의 배리어를 뚫고 명중했습니다!`);
          }
        }

        if (skillMsg) {
          addLog(skillMsg);
        }

        // 보스 대미지 동시 반영
        const nextBossHp = Math.max(0, bossHp - finalDmg);
        if (finalDmg > 0) {
          setBossHp(nextBossHp);

          setTimeout(() => setBossShake(false), 300);
        }

        // 파티원 개별 상태 변경 적용
        setParty(prev => prev.map(c => {

            } else if (c.classType === "Assassin") {
              return { ...c, defenseActive: true, stealthCharged: true }; // 은신 충전 완료!
            }
          }

        }));

        if (nextBossHp <= 0) {
          handleBossDefeat();
        } else {
          progressTurn();
        }
      };

      // 3. 보스 즉각 반격 (행동 완료 0.8초 딜레이 실행)
      const progressTurn = () => {
        const currentPatternIdx = (turnCounter - 1) % 3;
        const currentPattern = activeBoss.patterns[currentPatternIdx];

        setTimeout(() => {
          // 이미 보스가 처치되었다면 반격을 막음
          if (bossHp <= 0) return;

          // 보스 패턴 연출용 타겟 리스트 필터링 (살아있는 영웅 대상)
          const aliveHeroes = party.filter(h => h.hp > 0);
          if (aliveHeroes.length === 0) return;

          // 보스별 맞춤형 타겟 로직 전개 (전체 광역 vs 타겟 제한형)
          let targetIds = [];
          let isSingleTargetPattern = false;
          let calculatedDmgOverride = null;

          // 보스 기본 가해 대미지 스케일러 반영
          const currentBossDmg = getBossDamage(currentBossIndex, loopCount);

          if (activeBoss.id === "zakum") {
            if (currentPatternIdx === 0) {
              const luckyHero = aliveHeroes[Math.floor(Math.random() * aliveHeroes.length)];
              targetIds = [luckyHero.id];
              isSingleTargetPattern = true;
              calculatedDmgOverride = Math.floor(40 * (1 + (loopCount - 1) * 0.30));
            } else if (currentPatternIdx === 1) {
              targetIds = aliveHeroes.map(h => h.id);
              calculatedDmgOverride = Math.floor(15 * (1 + (loopCount - 1) * 0.30));
            } else if (currentPatternIdx === 2) {
              targetIds = aliveHeroes.map(h => h.id);
              calculatedDmgOverride = Math.floor(40 * (1 + (loopCount - 1) * 0.30));
            }
          } else if (activeBoss.id === "horntail") {
            if (currentPatternIdx === 0) {
              const shuffled = [...aliveHeroes].sort(() => 0.5 - Math.random());
              targetIds = shuffled.slice(0, 2).map(h => h.id);
              isSingleTargetPattern = true;
              calculatedDmgOverride = Math.floor(30 * (1 + (loopCount - 1) * 0.30));
            } else if (currentPatternIdx === 1) {
              targetIds = aliveHeroes.map(h => h.id);
              calculatedDmgOverride = Math.floor(25 * (1 + (loopCount - 1) * 0.30));
            } else if (currentPatternIdx === 2) {
              targetIds = aliveHeroes.map(h => h.id);
              calculatedDmgOverride = Math.floor(50 * (1 + (loopCount - 1) * 0.30));
            }
          } else if (activeBoss.id === "pinkbean") {
            if (currentPatternIdx === 0) {
              const luckyHero = aliveHeroes[Math.floor(Math.random() * aliveHeroes.length)];
              targetIds = [luckyHero.id];
              isSingleTargetPattern = true;
              calculatedDmgOverride = Math.floor(45 * (1 + (loopCount - 1) * 0.30));
            } else if (currentPatternIdx === 1) {
              targetIds = aliveHeroes.map(h => h.id);
              calculatedDmgOverride = Math.floor(25 * (1 + (loopCount - 1) * 0.30));
            } else if (currentPatternIdx === 2) {
              targetIds = aliveHeroes.map(h => h.id);
              calculatedDmgOverride = Math.floor(35 * (1 + (loopCount - 1) * 0.30));
            }
          }

          // 로그 문구 출력 및 시각 효과 피드백
          if (isSingleTargetPattern) {

            addLog(`👿 [보스 타겟 공격] ${activeBoss.name}의 패턴 『${currentPattern.name}』이(가) [${namesText}]을(를) 정밀 포격했습니다!`);

            addLog(`👿 [보스 광역 공격] ${activeBoss.name}의 패턴 『${currentPattern.name}』이(가) 가동되었습니다! (${currentPattern.effect})`);

            const mageChar = prev.find(c => c.classType === "Mage");

            const finalParty = prev.map(c => {
              if (c.hp <= 0 || !targetIds.includes(c.id)) return c;

              let finalIncurredDmg = calculatedDmgOverride !== null ? calculatedDmgOverride : currentBossDmg;

                if (c.classType === "Assassin") {
                  finalIncurredDmg = 0;
                  addLog(`👤 [은신 무적] [암살자 ${c.name}]은(는) 그림자 틈새에 숨어 어떤 타격도 받지 않았습니다!`);

              };

          setTimeout(() => setPartyHitFlash(false), 300);
        }, 800);
      };

      // 4. 보스 패배 성공 연쇄 (다음 보스 전환 시 영웅 전원 부활 및 최대 수치 회복 적용)
      const handleBossDefeat = () => {
        addLog(`🎉 축하합니다! 보스 『${activeBoss.name}』 격퇴에 성공했습니다!`);

        setGlobalExp(prev => prev + activeBoss.expReward);

        if (currentBossIndex >= BOSS_DATA.length - 1) {
          setVictory(true); // 그랜드 빅토리 오버레이 팝업 트리거
          addLog("🏆 [GRAND CLEAR] 승리! 메이플 세계를 위협하던 모든 무시무시한 심연의 보스가 잠들었습니다!");
        } else {
          const nextIdx = currentBossIndex + 1;
          setTimeout(() => {
            setCurrentBossIndex(nextIdx);
            setBossHp(getBossMaxHp(nextIdx, loopCount));
            setTurnCounter(1); // 전투 준비 대기 상태(turnCounter === 1) 진입
            
            // 다음 보스 진입 전 쓰러진 모든 영웅 부활 및 풀체력 회복!

              hp: c.maxHp, 
              defenseActive: false, 
              stealthCharged: false,
              shieldAmount: 0 
            })));

            addLog(`💖 [부활 및 회복] 새로운 전장을 맞이하여 쓰러졌던 영웅들이 전원 부활하고 최대 체력을 회복했습니다!`);
            addLog(`🚨 [새로운 차원] Level ${nextIdx + 1} 보스 『${BOSS_DATA[nextIdx].name}』가 잠에서 깨어났습니다!`);
          }, 1500);
        }
      };

      // 5. 경험치 주입 레벨업 (체감 난이도 밸런싱: 필요 경험치 요구량 30 EXP -> 50 EXP 너프 적용)
      const distributeExp = (charId) => {
        if (globalExp < 50) {
          alert("경험치가 부족합니다! 보스를 사냥하여 경험치를 50 이상 모으세요.");
          return;
        }

        setGlobalExp(prev => prev - 50);
        setParty(prev => prev.map(c => {
          if (c.id === charId) {
            const nextLvl = c.level + 1;
            const updatedMaxHp = c.maxHp + 25; 
            const updatedDmg = c.baseDmg + 5;  
            addLog(`🌟 [성장] [${c.name}]이(가) 레벨 ${nextLvl} 달성! (최대 HP +25, 스킬 기본 위력 +5)`);
            
            // 전투 전(turnCounter === 1)에는 최대 체력과 현재 체력이 같이 오르며, 
            // 전투 진행 중(turnCounter > 1)에는 현재 체력이 치료되지 않고 유지됩니다.
            const nextHpValue = (turnCounter === 1) ? updatedMaxHp : c.hp;

            return {
              ...c,
              level: nextLvl,
              maxHp: updatedMaxHp,
              hp: nextHpValue, 
              baseDmg: updatedDmg
            };
          }
          return c;
        }));
      };

      // 6. 무한 차원 루프 다음 회차 시작 (New Game Plus 기능 구현)
      const handleNextLoop = () => {
        const nextLoop = loopCount + 1;
        setLoopCount(nextLoop);
        setCurrentBossIndex(0);
        setBossHp(getBossMaxHp(0, nextLoop));
        setTurnCounter(1);
        setVictory(false);
        setGameOver(false);
        
        // 다음 회차 진입 시 영웅 전원 체력 및 방어 장벽 깔끔하게 초기화
        setParty(prev => prev.map(hero => ({
          ...hero,
          hp: hero.maxHp,
          defenseActive: false,
          stealthCharged: false,
          shieldAmount: 0
        })));
        
        addLog(`🌌 [차원 상승] 영웅들의 성장을 이어받아 『${nextLoop}회차 루프』가 발동했습니다! 보스들의 최대 체력(+50%)과 대미지(+30%)가 영구적으로 강화됩니다.`);
      };

      const handleRetryLevel = () => {
        setBossHp(getBossMaxHp(currentBossIndex, loopCount));
        setTurnCounter(1);
        setGameOver(false);
        setVictory(false);
        setParty(prev => prev.map(hero => ({
          ...hero,
          hp: hero.maxHp,
          defenseActive: false,
          stealthCharged: false,

                            disabled={globalExp < 50} // 30 -> 50 으로 수정하여 경험치 주입 요구량 증폭
                            onClick={() => distributeExp(hero.id)}
                            title="경험치 50을 주입하여 영구 스탯 성장" // 30 -> 50 툴팁 멘트 수정
                            class={`py-1 px-2 text-[10px] font-bold rounded transition-colors pixel-border-sm ${
                              globalExp >= 50 
                                ? "bg-purple-600 text-white hover:bg-purple-500" 
                                : "bg-gray-800 text-gray-500 cursor-not-allowed"
                            }`}
                          >
                            + EXP
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

            </div>
          </div>

          {/* 푸터 가이드라인 */}
          <footer class="mt-8 bg-gray-900 p-5 rounded-lg border-2 border-gray-800 text-xs text-gray-400 space-y-2 font-sans">
            <h3 class="font-bold text-gray-200 font-sans">ℹ️ 과제 요구사항 및 게임 제어 도움말</h3>
            <ul class="list-disc pl-5 space-y-1 font-sans">
              <li><b>다형성 스킬 발동:</b> 캐릭터 카드 하단의 명세를 읽고 <b>공격</b> 또는 <b>스킬</b> 버튼을 상황에 맞게 교차로 입력해 보세요. 각 동작마다 파이썬의 오버라이딩에 해당하는 고유 스크립트가 실행됩니다.</li>
              <li><b>경험치 성장 시스템:</b> 보스를 제압하여 EXP를 <b>50 이상</b> 모으면 영웅의 <b>+ EXP</b> 버튼을 눌러 스탯 수치를 동적으로 영구 상승시킬 수 있습니다.</li>
            </ul>
          </footer>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
